; ============================================================
;  MQTT Matrix Display — platformio.ini
;  Supports: ESP32-S2 | ESP8266
;
;  ── Choosing your default MCU ───────────────────────────────
;  Set default_envs to whichever target(s) VS Code / CLI
;  should build automatically (click ✓ Build or pio run).
;
;  One MCU only:
;    default_envs = esp32s2
;    default_envs = esp8266
;
;  Both MCUs at once (builds / checks both in parallel):
;    default_envs = esp32s2, esp8266
;
;  ── Uploading a specific target explicitly ──────────────────
;    pio run -e esp32s2 -t upload
;    pio run -e esp8266 -t upload
; ============================================================

; ── Default MAX7219 wiring (D1 Mini labels → GPIO) ────────────
;   D5 (GPIO14) = CLK
;   D6 (GPIO12) = CS / LOAD
;   D7 (GPIO13) = DATA / DIN

[platformio]
; ▼ Change this line to set your default target(s)
default_envs = esp32s2
; default_envs = esp8266
; default_envs = esp32s2, esp8266

; ── Shared settings ────────────────────────────────────────────
; extra_scripts runs before compilation: compresses web/index.html
; into include/html_page.h as a PROGMEM gzip byte array.
; Edit web/index.html freely — the header is regenerated automatically.
[env]
extra_scripts = pre:compress_html.py
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
lib_deps =
    knolleary/PubSubClient  @ ^2.8
    bblanchon/ArduinoJson   @ ^7.0
    tzapu/WiFiManager       @ ^2.0.17
    majicdesigns/MD_MAX72XX @ ^3.5
    majicdesigns/MD_Parola  @ ^3.7
build_flags =
    -DMQTT_MAX_PACKET_SIZE=512

; ============================================================
;  ESP32-S2
;  Default board : esp32-s2-saola-1
;  Alternatives  : lolin_s2_mini  |  esp32-s2-kaluga-1
; ============================================================
[env:esp32s2]
platform               = espressif32
board                  = esp32-s2-saola-1
; board                = lolin_s2_mini
; board                = esp32-s2-kaluga-1
framework              = arduino
board_build.filesystem = littlefs
lib_deps =
    ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -DESP32
    -DESP32S2
; Uncomment and set your port if auto-detect fails:
; upload_port = /dev/ttyUSB0   ; Linux
; upload_port = COM3            ; Windows

; ============================================================
;  ESP8266
;  Default board : d1_mini  (Wemos D1 Mini)
;  Alternatives  : nodemcuv2  |  d1_mini_pro  |  esp12e
; ============================================================
[env:esp8266]
platform               = espressif8266
board                  = d1_mini
; board                = nodemcuv2
; board                = d1_mini_pro
; board                = esp12e
framework              = arduino
board_build.filesystem = littlefs
lib_deps =
    ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -DESP8266
; Uncomment and set your port if auto-detect fails:
; upload_port = /dev/ttyUSB0   ; Linux
; upload_port = COM3            ; Windows

